apiVersion: v1
kind: ServiceAccount
metadata:
  name: nominal-code-controller
  namespace: nominal-code
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nominal-code-job-creator
  namespace: nominal-code
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nominal-code-job-creator
  namespace: nominal-code
subjects:
  - kind: ServiceAccount
    name: nominal-code-controller
    namespace: nominal-code
roleRef:
  kind: Role
  name: nominal-code-job-creator
  apiGroup: rbac.authorization.k8s.io
