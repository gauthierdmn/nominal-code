apiVersion: apps/v1
kind: Deployment
metadata:
  name: nominal-code-server
  namespace: nominal-code
spec:
  template:
    spec:
      containers:
        - name: server
          env:
            - name: CONFIG_PATH
              value: "/etc/nominal-code/config.yaml"
            - name: ALLOWED_USERS
              value: "test-user"
            - name: REVIEWER_BOT_USERNAME
              value: "nominal-bot"
            - name: AGENT_PROVIDER
              value: "google"
