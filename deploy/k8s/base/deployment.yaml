apiVersion: apps/v1
kind: Deployment
metadata:
  name: nominal-code-server
  namespace: nominal-code
  labels:
    app.kubernetes.io/name: nominal-code
    app.kubernetes.io/component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nominal-code
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nominal-code
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: nominal-code-server
      containers:
        - name: server
          image: ghcr.io/gauthierdmn/nominal-code:latest
          imagePullPolicy: Always
          command: ["uv", "run", "--no-sync", "nominal-code", "serve"]
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: nominal-code-secrets
          env:
            - name: CONFIG_PATH
              value: "/etc/nominal-code/config.yaml"
          volumeMounts:
            - name: config
              mountPath: /etc/nominal-code
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: nominal-code-config
