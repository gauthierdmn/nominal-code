spec:
  inputs:
    provider:
      description: "LLM provider to use (anthropic, openai, deepseek, groq, together, fireworks)"
      default: "anthropic"
      options:
        - anthropic
        - openai
        - deepseek
        - groq
        - together
        - fireworks
    image:
      description: >
        Docker image to use. The default all-in-one image works with any provider.
        For a smaller footprint, use a provider-specific variant:
        anthropic -> ghcr.io/gauthierdmn/nominal-code-anthropic:latest,
        openai/deepseek/groq/together/fireworks -> ghcr.io/gauthierdmn/nominal-code-openai:latest
      default: "ghcr.io/gauthierdmn/nominal-code:latest"
    model:
      description: "Model to use (e.g. claude-sonnet-4-20250514, gpt-4.1). Defaults to the provider's default model."
      default: ""
    max_turns:
      description: "Maximum agentic turns for the reviewer (0 = unlimited)"
      default: "0"
    prompt:
      description: "Custom review instructions appended to the default prompt"
      default: ""
    coding_guidelines:
      description: "Path to a coding guidelines file (relative to repo root)"
      default: ""
    stage:
      description: "Pipeline stage to run in"
      default: "test"

---

nominal-code-review:
  stage: $[[ inputs.stage ]]
  image: $[[ inputs.image ]]
  variables:
    AGENT_PROVIDER: $[[ inputs.provider ]]
    INPUT_MODEL: $[[ inputs.model ]]
    INPUT_MAX_TURNS: $[[ inputs.max_turns ]]
    INPUT_PROMPT: $[[ inputs.prompt ]]
    INPUT_CODING_GUIDELINES: $[[ inputs.coding_guidelines ]]
  script:
    - /entrypoint.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
