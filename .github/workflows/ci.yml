name: CI

on:
  push:
    branches: [main]
    tags: ["[0-9]+.[0-9]+.[0-9]+"]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - run: uv sync

      - name: Ruff lint
        run: uv run ruff check nominal_code/ tests/

      - name: Ruff format
        run: uv run ruff format --check nominal_code/ tests/

      - name: Mypy
        run: uv run mypy nominal_code/

      - name: Check docstrings
        working-directory: .
        run: python3 scripts/check_docstrings.py --ci

  unit-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - run: uv sync

      - name: Pytest
        run: uv run pytest

  unit-test-provider-isolation:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extras: [anthropic, openai, google]
    name: unit-test (${{ matrix.extras }} only)
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - name: Install with ${{ matrix.extras }} extra only
        run: uv sync --no-default-groups --group test --extra ${{ matrix.extras }}

      - name: Pytest
        run: uv run --no-sync pytest

  integration-test-local:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - run: uv sync

      - name: Integration tests (local)
        env:
          TEST_PIPELINE_ID: ${{ github.sha }}
          TEST_GITHUB_TOKEN: ${{ secrets.TEST_GITHUB_TOKEN }}
          NOMINALBOT_GITHUB_APP_ID: ${{ secrets.NOMINALBOT_GITHUB_APP_ID }}
          NOMINALBOT_GITHUB_APP_PRIVATE_KEY: ${{ secrets.NOMINALBOT_GITHUB_APP_PRIVATE_KEY }}
          NOMINALBOT_GITHUB_INSTALLATION_ID: ${{ secrets.NOMINALBOT_GITHUB_INSTALLATION_ID }}
          TEST_GITLAB_TOKEN: ${{ secrets.TEST_GITLAB_TOKEN }}
        run: uv run pytest tests/integration/ -m integration -v

  build-image:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - extras: anthropic
            image: nominal-code-anthropic
          - extras: openai
            image: nominal-code-openai
          - extras: google
            image: nominal-code-google
          - extras: all
            image: nominal-code
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/Dockerfile
          push: true
          build-args: EXTRAS=${{ matrix.extras }}
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}

  integration-test-pipeline:
    needs: [build-image]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: nominal-code
            provider: anthropic
          - image: nominal-code-anthropic
            provider: anthropic
          - image: nominal-code-openai
            provider: openai
          - image: nominal-code-google
            provider: google
    name: integration-test-pipeline (${{ matrix.image }})
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - run: uv sync

      - name: Pipeline tests
        env:
          TEST_PIPELINE_ID: ${{ github.sha }}
          TEST_DOCKER_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}
          TEST_PROVIDER: ${{ matrix.provider }}
          TEST_GITHUB_TOKEN: ${{ secrets.TEST_GITHUB_TOKEN }}
          TEST_GITLAB_TOKEN: ${{ secrets.TEST_GITLAB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: uv run pytest tests/integration/ -m integration_pipeline -v

  integration-test-webhook-server:
    needs: [build-image]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - run: uv sync

      - name: Install cloudflared
        run: ../scripts/ci/install-cloudflared.sh

      - name: Webhook server tests
        env:
          TEST_PIPELINE_ID: ${{ github.sha }}
          TEST_GITHUB_TOKEN: ${{ secrets.TEST_GITHUB_TOKEN }}
          TEST_GITLAB_TOKEN: ${{ secrets.TEST_GITLAB_TOKEN }}
        run: uv run pytest tests/integration/ -m integration_webhook_server -v

  cleanup:
    needs: [integration-test-local, integration-test-pipeline, integration-test-webhook-server]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Clean stale test resources
        env:
          GH_TOKEN: ${{ secrets.TEST_GITHUB_TOKEN }}
          TEST_GITLAB_TOKEN: ${{ secrets.TEST_GITLAB_TOKEN }}
        run: scripts/ci/cleanup-stale-test-resources.sh

      - name: Delete SHA-tagged images
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for package in nominal-code nominal-code-anthropic nominal-code-openai nominal-code-google; do
            IMAGE_PACKAGE="$package" IMAGE_TAG="${{ github.sha }}" scripts/ci/cleanup-test-image.sh
          done

  ci:
    needs:
      - check
      - unit-test
      - unit-test-provider-isolation
      - integration-test-local
      - build-image
      - integration-test-pipeline
      - integration-test-webhook-server
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: exit 1
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')

  promote:
    needs: [ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [nominal-code, nominal-code-anthropic, nominal-code-openai, nominal-code-google]
    permissions:
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag ${{ matrix.image }}:latest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest \
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}

  release:
    needs: [ci]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [nominal-code, nominal-code-anthropic, nominal-code-openai, nominal-code-google]
    permissions:
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag ${{ matrix.image }}:${{ github.ref_name }}
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.ref_name }} \
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}
