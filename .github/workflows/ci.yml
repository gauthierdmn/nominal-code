name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - run: uv sync

      - name: Ruff lint
        run: uv run ruff check nominal_code/ tests/

      - name: Ruff format
        run: uv run ruff format --check nominal_code/ tests/

      - name: Mypy
        run: uv run mypy nominal_code/

      - name: Check docstrings
        working-directory: .
        run: python3 scripts/check_docstrings.py --ci

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - run: uv sync

      - name: Pytest
        run: uv run pytest

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/Dockerfile
          push: false

  ci:
    needs: [check, test, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: exit 1
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')

  promote:
    needs: [check, test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image as latest
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
