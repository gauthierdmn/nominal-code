site_name: Nominal Code
site_description: AI-powered code review bot for GitHub PRs and GitLab MRs
site_url: https://gauthierdmn.github.io/nominal-code/
repo_url: https://github.com/gauthierdmn/nominal-code
repo_name: gauthierdmn/nominal-code

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Modes:
      - CI: modes/ci.md
      - CLI: modes/cli.md
      - Webhook: modes/webhook.md
  - Platforms:
      - GitHub: platforms/github.md
      - GitLab: platforms/gitlab.md
  - Bots:
      - Reviewer: bots/reviewer.md
      - Worker: bots/worker.md
  - Reference:
      - Configuration: reference/configuration.md
      - Environment Variables: reference/env-vars.md
  - Architecture: architecture.md
  - Security: security.md
  - Deployment: deployment.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true
